[workspace]
members = [
    "crates/trusty-search-core",
    "crates/trusty-search-service",
    "crates/trusty-search-mcp",
    ".",
]
resolver = "2"

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
async-trait = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
dashmap = "5"
axum = "0.7"
tower-http = { version = "0.5", features = ["cors", "trace", "compression-gzip"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
clap = { version = "4", features = ["derive", "env"] }
clap_complete = "4"
colored = "2"
indicatif = "0.17"
dotenvy = "0.15"
include_dir = "0.7"
open = "5"
libc = "0.2"
trusty-mcp-core = { git = "https://github.com/bobmatnyc/trusty-common", tag = "trusty-mcp-core-v0.1.0" }
trusty-embedder = { git = "https://github.com/bobmatnyc/trusty-common", tag = "trusty-embedder-v0.1.0" }
trusty-common = { git = "https://github.com/bobmatnyc/trusty-common", tag = "trusty-common-v0.1.0" }

# Local development override: use the in-tree trusty-common workspace so
# changes here are picked up without a release cycle. Cargo requires every
# crate exported from the patched source to be listed, even if not all are
# consumed.
[patch."https://github.com/bobmatnyc/trusty-common"]
trusty-common = { path = "../trusty-common/crates/trusty-common" }
trusty-embedder = { path = "../trusty-common/crates/trusty-embedder" }
trusty-mcp-core = { path = "../trusty-common/crates/trusty-mcp-core" }

[package]
name = "trusty-search"
version = "0.1.57"
edition = "2021"
description = "Machine-wide hybrid code search service: BM25 + vector + KG, zero cold-start, MCP server"
license = "MIT"
repository = "https://github.com/bobmatnyc/trusty-search"

[[bin]]
name = "trusty-search"
path = "src/main.rs"

[dependencies]
trusty-search-core = { path = "crates/trusty-search-core" }
trusty-search-service = { path = "crates/trusty-search-service" }
trusty-search-mcp = { path = "crates/trusty-search-mcp" }
trusty-common = { workspace = true }
tokio = { workspace = true }
clap = { workspace = true }
clap_complete = { workspace = true }
colored = { workspace = true }
indicatif = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
dotenvy = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
axum = { workspace = true }
reqwest = { workspace = true }
dirs = "5"
fs4 = { version = "0.8", features = ["sync"] }
walkdir = "2"
open = { workspace = true }
libc = "0.2"
eventsource-stream = "0.2"
futures-util = "0.3"

[dev-dependencies]
walkdir = "2"
tokio = { workspace = true }
